<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piano Coach — MIDI Library</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<script src="api-config.js"></script>
<style>
  :root{ --bg:#0a0a0f; --surface:#111118; --surface2:#1a1a24; --border:#2a2a3a; --accent:#c8a96e; --accent2:#7eb8c8; --wrong:#e05a5a; --right:#5ae0a0; --warn:#e0a85a; --text:#e8e8f0; --text-dim:#6a6a8a; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:var(--bg); color:var(--text); font-family:'Space Mono',monospace; min-height:100vh; }
  body::before{ content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events:none; z-index:1000; opacity:0.4; }
  header{ display:flex; align-items:center; justify-content:space-between; padding:14px 28px; border-bottom:1px solid var(--border); background:var(--surface); position:sticky; top:0; z-index:100; flex-wrap:wrap; gap:10px; }
  .logo{ font-family:'Playfair Display',serif; font-size:1.3rem; color:var(--accent); }
  .logo span{ font-size:0.6rem; color:var(--text-dim); font-family:'Space Mono',monospace; display:block; letter-spacing:0.18em; }
  .nav-btn{ padding:6px 13px; border-radius:6px; border:1px solid var(--border); background:var(--surface2); color:var(--text-dim); font-family:'Space Mono',monospace; font-size:0.63rem; text-decoration:none; transition:all 0.2s; }
  .nav-btn:hover{ border-color:var(--accent); color:var(--accent); }
  main{ max-width:760px; margin:0 auto; padding:28px 22px; }
  .card{ background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:22px 24px; margin-bottom:18px; }
  .card-title{ font-size:0.62rem; letter-spacing:0.2em; color:var(--text-dim); text-transform:uppercase; margin-bottom:16px; }
  .uzone{ border:2px dashed var(--border); border-radius:12px; padding:28px 16px; text-align:center; cursor:pointer; transition:all 0.2s; background:var(--surface2); position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:7px; }
  .uzone:hover,.uzone.drag{ border-color:var(--accent); background:rgba(200,169,110,0.04); }
  .uzone.loaded{ border-color:var(--accent2); border-style:solid; }
  .uzone input[type=file]{ position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
  .uzone-icon{ font-size:1.8rem; }
  .uzone-title{ font-size:0.75rem; font-weight:700; }
  .uzone-sub{ font-size:0.58rem; color:var(--text-dim); }
  .uzone-fname{ font-size:0.62rem; color:var(--accent2); margin-top:3px; word-break:break-all; }
  .field-row{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; }
  .field{ display:flex; flex-direction:column; gap:6px; }
  .field label{ font-size:0.55rem; letter-spacing:0.16em; color:var(--text-dim); text-transform:uppercase; }
  .field input{ padding:9px 12px; border-radius:7px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-family:'Space Mono',monospace; font-size:0.72rem; outline:none; transition:border-color 0.2s; }
  .field input:focus{ border-color:var(--accent2); }
  .btn{ padding:10px 22px; border-radius:8px; border:1px solid var(--accent); background:transparent; color:var(--accent); font-family:'Space Mono',monospace; font-size:0.7rem; letter-spacing:0.1em; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
  .btn:hover:not(:disabled){ background:var(--accent); color:var(--bg); }
  .btn:disabled{ opacity:0.35; cursor:not-allowed; }
  .btn.sec{ border-color:var(--border); color:var(--text-dim); }
  .btn.sec:hover{ border-color:var(--accent2); color:var(--accent2); background:transparent; }
  .prog-wrap{ margin:14px 0; }
  .prog-lbl{ font-size:0.6rem; color:var(--text-dim); margin-bottom:6px; }
  .prog-track{ height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
  .prog-fill{ height:5px; background:var(--accent2); border-radius:3px; width:0%; transition:width 0.2s; }
  .midi-empty{ text-align:center; padding:32px; color:var(--text-dim); font-size:0.7rem; }
  .midi-grid{ display:flex; flex-direction:column; gap:10px; }
  .midi-item{ display:flex; align-items:center; gap:14px; padding:14px 16px; border-radius:10px; border:1px solid var(--border); background:var(--surface2); transition:border-color 0.2s; }
  .midi-item:hover{ border-color:var(--border); }
  .midi-info{ flex:1; min-width:0; }
  .midi-title{ font-size:0.74rem; font-weight:700; color:var(--accent2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .midi-meta{ font-size:0.56rem; color:var(--text-dim); margin-top:2px; }
  .mdel-btn{ padding:5px 10px; border-radius:6px; border:1px solid var(--border); background:transparent; color:var(--text-dim); font-family:'Space Mono',monospace; font-size:0.58rem; cursor:pointer; transition:all 0.2s; flex-shrink:0; }
  .mdel-btn:hover{ border-color:var(--wrong); color:var(--wrong); }
  .note-preview{ display:flex; gap:4px; overflow-x:auto; padding-bottom:4px; scrollbar-width:thin; margin-top:8px; }
  .nbdg{ padding:3px 7px; border-radius:4px; font-size:0.6rem; font-weight:700; border:1px solid var(--border); background:var(--surface); color:var(--text-dim); flex-shrink:0; }
  .parse-info{ font-size:0.6rem; color:var(--text-dim); margin-bottom:14px; }
  @media(max-width:600px){ .field-row{ grid-template-columns:1fr; } }
</style>
</head>
<body>
<header>
  <div class="logo">Piano Coach <span>MIDI LIBRARY</span></div>
  <div style="display:flex;gap:8px;">
    <a class="nav-btn" href="piano-coach-v3.5.html">🎹 Practice</a>
    <a class="nav-btn" href="dashboard.html">← Dashboard</a>
  </div>
</header>
<main>

  <!-- Upload card -->
  <div class="card">
    <div class="card-title">Upload MIDI Reference</div>
    <div class="uzone" id="midiZone">
      <input type="file" id="midiFile" accept=".mid,.midi">
      <div class="uzone-icon">🎼</div>
      <div class="uzone-title">Drop a MIDI file here</div>
      <div class="uzone-sub">.mid or .midi · the reference version of the piece</div>
      <div class="uzone-fname" id="midiFName"></div>
    </div>
    <div id="midiForm" style="display:none;margin-top:16px;">
      <div class="field-row">
        <div class="field"><label>Song title</label><input type="text" id="midiTitle" placeholder="e.g. Für Elise"></div>
        <div class="field"><label>Composer (optional)</label><input type="text" id="midiComposer" placeholder="e.g. Beethoven"></div>
      </div>
      <div class="parse-info" id="midiInfo"></div>
      <div id="midiNotePreview" class="note-preview" style="margin-bottom:14px;"></div>
      <div style="display:flex;gap:10px;">
        <button class="btn" id="midiSaveBtn" onclick="saveMidi()" disabled>💾 SAVE TO LIBRARY</button>
        <button class="btn sec" onclick="clearUpload()">✕ CANCEL</button>
      </div>
      <div class="prog-wrap" id="midiProg" style="display:none;">
        <div class="prog-lbl" id="midiProgLbl">Parsing…</div>
        <div class="prog-track"><div class="prog-fill" id="midiProgFill"></div></div>
      </div>
    </div>
  </div>

  <!-- Library card -->
  <div class="card">
    <div class="card-title">Your MIDI Library</div>
    <div id="midiLibrary"><div class="midi-empty">No MIDI references saved yet.</div></div>
  </div>

</main>

<script>
const API_URL = getApiUrl();  // already includes /api — e.g. http://localhost:5000/api
const token   = localStorage.getItem('pc_token');
if(!token) window.location.href='login.html';
const AUTH = {'Authorization':'Bearer '+token,'Content-Type':'application/json'};

const NOTE_NAMES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const m2full = m => NOTE_NAMES[m%12]+(Math.floor(m/12)-1);

let parsedMidiNotes=[];

//    Drag-and-drop zone setup                                                   
const zone  = document.getElementById('midiZone');
const input = document.getElementById('midiFile');
zone.addEventListener('dragover', e=>{e.preventDefault();zone.classList.add('drag');});
zone.addEventListener('dragleave', ()=>zone.classList.remove('drag'));
zone.addEventListener('drop', e=>{e.preventDefault();zone.classList.remove('drag');const f=e.dataTransfer.files[0];if(f)handleMidiFile(f);});
input.addEventListener('change', e=>{if(e.target.files[0])handleMidiFile(e.target.files[0]);});

//    MIDI parsing                                                               
async function handleMidiFile(file){
  if(!file.name.match(/\.midi?$/i)){alert('Please upload a .mid or .midi file.');return;}
  document.getElementById('midiFName').textContent=file.name;
  zone.classList.add('loaded');
  document.getElementById('midiForm').style.display='block';
  document.getElementById('midiProg').style.display='block';
  document.getElementById('midiProgFill').style.width='20%';
  document.getElementById('midiProgLbl').textContent='Parsing MIDI…';
  try{
    parsedMidiNotes=parseMidi(new Uint8Array(await file.arrayBuffer()));
    document.getElementById('midiProgFill').style.width='100%';
    document.getElementById('midiProgLbl').textContent='Parsed — '+parsedMidiNotes.length+' notes';
    document.getElementById('midiInfo').textContent=
      parsedMidiNotes.length+' notes detected'+(parsedMidiNotes.length?
        ' · '+m2full(parsedMidiNotes[0].midi)+' to '+m2full(parsedMidiNotes[parsedMidiNotes.length-1].midi):'');
    // Show first 20 notes as preview chips
    const prev=document.getElementById('midiNotePreview'); prev.innerHTML='';
    parsedMidiNotes.slice(0,24).forEach((n,i)=>{
      const b=document.createElement('span');b.className='nbdg';
      b.textContent=(i+1)+'. '+m2full(n.midi);prev.appendChild(b);
    });
    if(parsedMidiNotes.length>24){const e=document.createElement('span');e.className='nbdg';e.textContent='+'+((parsedMidiNotes.length-24)+' more');prev.appendChild(e);}
    document.getElementById('midiSaveBtn').disabled=parsedMidiNotes.length===0;
    if(!document.getElementById('midiTitle').value)
      document.getElementById('midiTitle').value=file.name.replace(/\.midi?$/i,'').replace(/[-_]/g,' ');
    setTimeout(()=>document.getElementById('midiProg').style.display='none',1200);
  }catch(e){document.getElementById('midiProgLbl').textContent='Error: '+e.message;console.error(e);}
}

function parseMidi(bytes){
  let pos=0;
  const r1=()=>bytes[pos++];
  const r2=()=>{const v=(bytes[pos]<<8)|bytes[pos+1];pos+=2;return v;};
  const r4=()=>{const v=(bytes[pos]<<24)|(bytes[pos+1]<<16)|(bytes[pos+2]<<8)|bytes[pos+3];pos+=4;return v;};
  const rvlq=()=>{let v=0,b;do{b=r1();v=(v<<7)|(b&0x7f);}while(b&0x80);return v;};
  if(String.fromCharCode(...bytes.slice(0,4))!=='MThd') throw new Error('Not a MIDI file');
  pos=4;r4();const fmt=r2(),tracks=r2(),tpb=r2();
  if(tpb&0x8000) throw new Error('SMPTE division not supported');
  const all=[];
  for(let t=0;t<tracks;t++){
    const tag=String.fromCharCode(...bytes.slice(pos,pos+4));pos+=4;
    if(tag!=='MTrk') throw new Error('Expected MTrk');
    const end=pos+r4();let tick=0,tempo=500000,last=0;
    while(pos<end){
      tick+=rvlq();
      let st=bytes[pos];
      if(st<0x80){st=last;}else{last=st;pos++;}
      const tp=st&0xf0;
      if(tp===0x90){const n=r1(),v=r1();if(v>0)all.push({midi:n,timeSec:tick/tpb*(tempo/1000000),tick});}
      else if(tp===0x80||tp===0xa0||tp===0xb0||tp===0xe0){pos+=2;}
      else if(tp===0xc0||tp===0xd0){pos+=1;}
      else if(st===0xff){const mt=r1(),ml=rvlq();if(mt===0x51&&ml===3)tempo=(bytes[pos]<<16)|(bytes[pos+1]<<8)|bytes[pos+2];pos+=ml;}
      else if(st===0xf0||st===0xf7){pos+=rvlq();}
      else pos++;
    }
    pos=end;
  }
  all.sort((a,b)=>a.tick-b.tick);
  const d=[];
  for(const n of all){const p=d[d.length-1];if(p&&p.midi%12===n.midi%12&&n.timeSec-p.timeSec<0.3)continue;d.push({midi:n.midi,timeSec:n.timeSec});}
  return d;
}

function clearUpload(){
  parsedMidiNotes=[];
  zone.classList.remove('loaded');
  document.getElementById('midiFName').textContent='';
  document.getElementById('midiForm').style.display='none';
  document.getElementById('midiNotePreview').innerHTML='';
  document.getElementById('midiTitle').value='';
  document.getElementById('midiComposer').value='';
  document.getElementById('midiFile').value='';
}

//    Library save / load / delete                                               
async function saveMidi(){
  const title=document.getElementById('midiTitle').value.trim();
  if(!title){document.getElementById('midiTitle').focus();return;}
  const btn=document.getElementById('midiSaveBtn');
  btn.disabled=true; btn.textContent='Saving…';
  try{
    const r=await fetch(API_URL+'/midi-references',{
      method:'POST',headers:AUTH,
      body:JSON.stringify({
        title,
        composer:document.getElementById('midiComposer').value.trim(),
        notes_json:JSON.stringify(parsedMidiNotes),
        note_count:parsedMidiNotes.length
      })
    });
    if(!r.ok) throw new Error('Server error '+r.status);
    clearUpload();
    loadLibrary();
  }catch(e){alert('Save failed: '+e.message);}
  btn.disabled=false; btn.textContent='💾 SAVE TO LIBRARY';
}

async function loadLibrary(){
  const wrap=document.getElementById('midiLibrary');
  wrap.innerHTML='<div class="midi-empty">Loading…</div>';
  try{
    const r=await fetch(API_URL+'/midi-references',{headers:AUTH});
    if(!r.ok) throw new Error('Server error '+r.status);
    const refs=await r.json();
    if(!refs.length){
      wrap.innerHTML='<div class="midi-empty">No MIDI references saved yet. Upload one above.</div>';
      return;
    }
    const grid=document.createElement('div'); grid.className='midi-grid';
    refs.forEach(ref=>{
      const el=document.createElement('div'); el.className='midi-item';
      el.innerHTML=`
        <div style="font-size:1.4rem;flex-shrink:0;">🎼</div>
        <div class="midi-info">
          <div class="midi-title">${esc(ref.title)}</div>
          <div class="midi-meta">${ref.composer?esc(ref.composer)+' · ':''}${ref.note_count} notes · ${ref.uploaded_at}</div>
        </div>
        <button class="mdel-btn" onclick="deleteRef(${ref.id},event)">✕ DELETE</button>`;
      grid.appendChild(el);
    });
    wrap.innerHTML=''; wrap.appendChild(grid);
  }catch(e){
    wrap.innerHTML='<div class="midi-empty" style="color:var(--wrong);">Failed to load: '+e.message+'</div>';
  }
}

async function deleteRef(id, e){
  e.stopPropagation();
  if(!confirm('Delete this MIDI reference?')) return;
  await fetch(API_URL+'/midi-references/'+id,{method:'DELETE',headers:AUTH});
  loadLibrary();
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

loadLibrary();
</script>
</body>
</html>
